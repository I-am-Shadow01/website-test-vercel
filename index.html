<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <style>
        /* CSS สำหรับความสวยงาม */
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --primary: #0070f3;
        }
        [data-theme='dark'] {
            --bg: #1a1a1a;
            --text: #ffffff;
            --primary: #3291ff;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            text-align: center;
            padding: 2rem;
            border: 1px solid #eaeaea;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 8px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: bold;
        }
        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #ddd;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="profile-img"></div>
        <h1 id="greeting">ยินดีต้อนรับสู่โปรไฟล์ของฉัน</h1>
        <p>กำลังเรียนรู้การทำเว็บด้วย Vercel + GitHub</p>
        
        <button onclick="toggleTheme()">เปลี่ยนโหมด มืด/สว่าง</button>
        <button onclick="changeText()">ทักทายด้วย JS</button>
    </div>

    <script>
        // JavaScript เริ่มต้นตรงนี้
        
        // 1. ฟังก์ชันเปลี่ยนสี Theme
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            if (currentTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'light');
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        }

        // 2. ฟังก์ชันเปลี่ยนข้อความ
        function changeText() {
            const h1 = document.getElementById('greeting');
            h1.innerText = "ยินดีด้วย! คุณรัน JavaScript สำเร็จแล้ว 🚀";
            h1.style.color = "#0070f3";
        }
    </script>
</body>
</html>
