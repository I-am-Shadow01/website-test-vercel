<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Professional Portfolio</title>
    <style>
        :root { --bg: #ffffff; --text: #171717; --accent: #0070f3; --card: #fafafa; }
        [data-theme='dark'] { --bg: #000000; --text: #ededed; --accent: #3291ff; --card: #111111; }
        
        body { 
            background: var(--bg); color: var(--text); 
            font-family: -apple-system, system-ui, sans-serif; 
            margin: 0; transition: 0.3s;
        }
        .nav { position: fixed; top: 20px; right: 20px; display: flex; gap: 10px; }
        select { 
            padding: 8px 12px; border-radius: 8px; border: 1px solid var(--accent);
            background: var(--bg); color: var(--text); cursor: pointer;
        }
        #app { 
            max-width: 800px; margin: 0 auto; padding: 100px 20px;
            display: flex; flex-direction: column; gap: 20px;
        }
        .hero h1 { font-size: 3.5rem; letter-spacing: -2px; margin: 0; }
        .hero p { font-size: 1.25rem; opacity: 0.6; }
        .badge { display: inline-block; padding: 4px 12px; background: var(--accent); color: white; border-radius: 20px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div id="app">
        <h1 style="color: red;">[ ACCESS DENIED ]</h1>
        <p>Sorry, this content requires JavaScript to render. Or maybe you're just a bot?</p>
    </div>

    <div class="nav">
        <select id="themeSelect" onchange="changeTheme(this.value)">
            <option value="system">💻 System</option>
            <option value="dark">🌑 Dark</option>
            <option value="light">☀️ Light</option>
        </select>
    </div>

    <script defer src="/_vercel/insights/script.js"></script>

    <script>
        const app = document.getElementById('app');
        const themeSelect = document.getElementById('themeSelect');

        // ข้อมูล Portfolio (ใส่ข้อมูลจริงของคุณตรงนี้ได้เลย)
        const profileData = {
            name: "YOUR NAME",
            role: "Full Stack Developer (Learning)",
            bio: "ชอบเขียนโค้ดและแกล้งคนใช้ curl เป็นชีวิตจิตใจ",
            projects: ["Vercel Deployment", "GitHub Actions", "Dynamic Theme System"]
        };

        function renderApp() {
            app.innerHTML = `
                <section class="hero">
                    <span class="badge">Available for Work</span>
                    <h1>I'm ${profileData.name}</h1>
                    <p>${profileData.role}</p>
                    <p style="max-width: 500px;">${profileData.bio}</p>
                </section>
                <section>
                    <h3>My Skills</h3>
                    <ul style="list-style: none; padding: 0; display: flex; gap: 10px; flex-wrap: wrap;">
                        ${profileData.projects.map(p => `<li style="padding: 10px 20px; background: var(--card); border: 1px solid var(--accent); border-radius: 10px;">${p}</li>`).join('')}
                    </ul>
                </section>
            `;
        }

        // ระบบจัดการธีม
        function applyTheme(mode) {
            const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (mode === 'dark' || (mode === 'system' && systemDark)) {
                document.documentElement.setAttribute('data-theme', 'dark');
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
            }
            localStorage.setItem('theme-pref', mode);
        }

        function changeTheme(val) { applyTheme(val); }

        window.onload = () => {
            const savedTheme = localStorage.getItem('theme-pref') || 'system';
            themeSelect.value = savedTheme;
            applyTheme(savedTheme);
            renderApp(); // พ่นหน้าเว็บสวยๆ ทับ
        };

        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
            if (themeSelect.value === 'system') applyTheme('system');
        });
    </script>
</body>
</html>
